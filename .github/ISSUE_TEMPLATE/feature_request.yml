name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea. Clear problem statements and concrete examples
        make feature requests much easier to evaluate.

  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What limitation, pain point, or workflow problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you would like to see
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Share workarounds or other approaches you considered.

  - type: dropdown
    id: impact
    attributes:
      label: Expected impact
      options:
        - Small improvement
        - Quality-of-life improvement
        - Major feature
        - Breaking or architectural change
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Mockups, examples, related tools, or implementation notes
